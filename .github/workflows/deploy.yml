name: CI/CD - Build, Push to DockerHub & Deploy to Render

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (for multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Build and Push Backend Docker Image
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend:${{ github.sha }}

      # 5. Build and Push Frontend Docker Image
      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:${{ github.sha }}

      # 6. Trigger Render Backend Deployment
      - name: Trigger Render Backend Deployment
        if: success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK_BACKEND }}

      # 7. Trigger Render Frontend Deployment
      - name: Trigger Render Frontend Deployment
        if: success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK_FRONTEND }}

      # 8. Deployment Summary
      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ Backend Image: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-backend:latest"
          echo "✅ Frontend Image: ${{ secrets.DOCKERHUB_USERNAME }}/todo-app-frontend:latest"
          echo "✅ Render deployments triggered!"
